services:
  mc:
    image: itzg/minecraft-server:latest
    tty: true
    stdin_open: true
    restart: "unless-stopped"
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      VERSION: "26.2"
      ENABLE_STATUS: "true"
      TYPE: "FABRIC"
      INIT_MEMORY: "512M"
      MAX_MEMORY: "3072M"
      MAX_PLAYERS: "5"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      TZ: "Europe/Berlin"
      DIFFICULTY: "hard"
      SIMULATION_DISTANCE: "10"
      LEVEL: "${WORLD}"
      OPS: |-
        timkley
        paulipantheri
      ENABLE_WHITELIST: "true"
      WHITELIST: |-
        timkley
        PitBull2709
        paulipantheri
        timkley1
        Kontheria
      MODRINTH_PROJECTS: |-
        armor-poser
        lithium
        audioplayer
        ferrite-core
        inventory-totem
        just-mob-heads
        shulker-drops-two
        # waystones
        glitchcore
        terrablender
        servercore
        simple-voice-chat
        xaeros-world-map
      MODRINTH_DOWNLOAD_DEPENDENCIES: "required"
      MODRINTH_ALLOWED_VERSION_TYPE: "alpha"
      SPAWN_PROTECTION: "0"
    volumes:
      - "./data:/data"
      - "./servercore:/data/config/servercore"

  backups:
    image: itzg/mc-backup
    environment:
      BACKUP_INTERVAL: "12h"
      RCON_HOST: mc
      RCON_PASSWORD: "${RCON_PASSWORD}"
      TZ: "Europe/Berlin"
    volumes:
      - "./data:/data:ro"
      - "./backups:/backups"
    labels:
      - "traefik.enable=false"
