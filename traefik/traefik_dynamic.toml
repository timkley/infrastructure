[http.middlewares.simpleAuth.basicAuth]
  usersfile = "/etc/traefik/usersfile"

[http.routers.api]
  rule = "Host(`traefik.timkley.dev`)"
  entrypoints = ["websecure"]
  middlewares = ["simpleAuth"]
  service = "api@internal"
  [http.routers.api.tls]
    certResolver = "lets-encrypt"

[http.serversTransports.insecureskipverify]
  insecureSkipVerify = true

# Native PHP sites (FrankenPHP via Octane)
[http.routers.bruderwo]
  rule = "Host(`bruderwo.timkley.dev`)"
  entrypoints = ["websecure"]
  service = "bruderwo"
  [http.routers.bruderwo.tls]
    certResolver = "lets-encrypt"

[http.services.bruderwo.loadBalancer]
  [[http.services.bruderwo.loadBalancer.servers]]
    url = "http://host.docker.internal:8001"
