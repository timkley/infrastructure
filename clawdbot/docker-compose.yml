services:
  gateway:
    image: ${CLAWDBOT_IMAGE:-clawdbot:local}
    build:
      context: ${CLAWDBOT_REPO_PATH:-.}
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    volumes:
      - ${CLAWDBOT_CONFIG_DIR:-./config}:/home/node/.clawdbot
      - ${CLAWDBOT_WORKSPACE_DIR:-./workspace}:/home/node/clawd
    networks:
      - web
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - TZ=Europe/Berlin
      - XDG_CONFIG_HOME=/home/node/.clawdbot
    command: ["node", "dist/index.js", "gateway", "--bind", "${CLAWDBOT_GATEWAY_BIND:-lan}", "--port", "18789"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${COMPOSE_PROJECT_NAME}.timkley.dev`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=lets-encrypt"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=18789"

  cli:
    image: ${CLAWDBOT_IMAGE:-clawdbot:local}
    profiles: ["cli"]
    init: true
    stdin_open: true
    tty: true
    volumes:
      - ${CLAWDBOT_CONFIG_DIR:-./config}:/home/node/.clawdbot
      - ${CLAWDBOT_WORKSPACE_DIR:-./workspace}:/home/node/clawd
    environment:
      - HOME=/home/node
      - TERM=xterm-256color
      - BROWSER=echo
      - TZ=Europe/Berlin
      - XDG_CONFIG_HOME=/home/node/.clawdbot
    entrypoint: ["node", "dist/index.js"]

networks:
  web:
    external: true
